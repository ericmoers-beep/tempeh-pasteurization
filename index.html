const { useState, useEffect, useRef, createElement: h } = React;

const SIZES = {
“8oz”: { label: “8 oz”, perTray: 14, trays: 7, std: 98, pushMax: 112 },
“2lb”: { label: “2 lb”, perTray: 4, trays: 7, std: 28, pushMax: 38 },
};

function distribute(total, pushMax) {
if (!total || total <= 0) return null;
const minBatches = Math.ceil(total / pushMax);
const perBatch = Math.floor(total / minBatches);
const extras = total % minBatches;
return { minBatches, perBatch, extras };
}

function formatTime(s) {
const m = Math.floor(s / 60);
const sec = s % 60;
return m + “:” + sec.toString().padStart(2, “0”);
}

const mono = “‘DM Mono’, monospace”;
const sans = “‘DM Sans’, sans-serif”;
const dim = “rgba(232,220,200,0.75)”;
const mid = “rgba(232,220,200,0.9)”;

function SmallLabel({ children }) {
return h(“div”, { style: {
fontSize: 10, textTransform: “uppercase”, letterSpacing: “0.12em”,
color: dim, fontFamily: mono, marginBottom: 8,
}}, children);
}

function NumInput({ value, onChange, placeholder, fontSize }) {
return h(“input”, {
type: “number”, inputMode: “numeric”, value, placeholder,
onChange: e => onChange(e.target.value),
style: {
width: “100%”, padding: “14px 16px”, fontSize: fontSize || 26, fontWeight: 800,
fontFamily: sans, color: “#e8dcc8”,
background: “rgba(255,255,255,0.03)”, border: “1.5px solid rgba(255,255,255,0.07)”,
borderRadius: 12, outline: “none”, boxSizing: “border-box”,
},
onFocus: e => e.target.style.borderColor = “rgba(184,212,168,0.3)”,
onBlur: e => e.target.style.borderColor = “rgba(255,255,255,0.07)”,
});
}

function DistCard({ label, total, pushMax }) {
const n = parseInt(total) || 0;
const dist = distribute(n, pushMax);
if (!dist) return null;

const distRows = [];
if (dist.extras > 0) {
distRows.push(
h(“div”, { key: “a”, style: { display: “flex”, justifyContent: “space-between”, alignItems: “center” }},
h(“span”, { style: { fontSize: 13, color: “rgba(232,220,200,0.9)” }},
dist.extras + “ batch” + (dist.extras > 1 ? “es” : “”) + “ with”),
h(“span”, { style: { fontSize: 20, fontWeight: 800, color: “#d4c49a”, fontFamily: mono }}, dist.perBatch + 1)
),
h(“div”, { key: “d”, style: { height: 1, background: “rgba(255,255,255,0.04)” }}),
h(“div”, { key: “b”, style: { display: “flex”, justifyContent: “space-between”, alignItems: “center” }},
h(“span”, { style: { fontSize: 13, color: “rgba(232,220,200,0.9)” }},
(dist.minBatches - dist.extras) + “ batch” + (dist.minBatches - dist.extras > 1 ? “es” : “”) + “ with”),
h(“span”, { style: { fontSize: 20, fontWeight: 800, color: “#d4c49a”, fontFamily: mono }}, dist.perBatch)
)
);
} else {
distRows.push(
h(“div”, { key: “a”, style: { display: “flex”, justifyContent: “space-between”, alignItems: “center” }},
h(“span”, { style: { fontSize: 13, color: “rgba(232,220,200,0.9)” }}, “all batches”),
h(“span”, { style: { fontSize: 20, fontWeight: 800, color: “#d4c49a”, fontFamily: mono }}, dist.perBatch)
)
);
}

const proof = dist.extras > 0
? dist.extras + “×” + (dist.perBatch + 1) + “ + “ + (dist.minBatches - dist.extras) + “×” + dist.perBatch + “ = “ + n
: dist.minBatches + “×” + dist.perBatch + “ = “ + n;

return h(“div”, { style: {
background: “rgba(255,255,255,0.035)”, borderRadius: 14,
padding: “22px 18px 18px”, border: “1px solid rgba(255,255,255,0.05)”,
}},
h(“div”, { style: { display: “flex”, justifyContent: “space-between”, alignItems: “baseline”, marginBottom: 18 }},
h(“span”, { style: { fontSize: 13, fontWeight: 800, color: mid }}, label),
h(“span”, { style: { fontSize: 12, fontFamily: mono, color: dim }}, n + “ total”)
),
h(“div”, { style: { textAlign: “center”, marginBottom: 18 }},
h(“span”, { style: { fontSize: 48, fontWeight: 800, color: “#b8d4a8”, lineHeight: 1 }}, dist.minBatches),
h(“div”, { style: { fontSize: 12, color: “rgba(184,212,168,0.85)”, fontFamily: mono, marginTop: 6 }}, “batches”)
),
h(“div”, { style: { background: “rgba(255,255,255,0.03)”, borderRadius: 10, padding: “14px 16px”, display: “flex”, flexDirection: “column”, gap: 12 }}, …distRows),
h(“div”, { style: { textAlign: “center”, fontSize: 10, marginTop: 12, color: “rgba(232,220,200,0.85)”, fontFamily: mono }}, proof)
);
}

function TimerView({ remaining, running, done, onToggle, onReset, DURATION }) {
const progress = 1 - remaining / DURATION;
const R = 58, C = 2 * Math.PI * R;
const ringColor = done ? “#cc9977” : running ? “#b8d4a8” : “rgba(184,212,168,0.65)”;

return h(“div”, { style: { display: “flex”, flexDirection: “column”, alignItems: “center”, padding: “36px 0 12px” }},
h(“div”, { style: { position: “relative”, width: 160, height: 160, marginBottom: 28 }},
h(“svg”, { width: 160, height: 160, viewBox: “0 0 160 160” },
h(“circle”, { cx: 80, cy: 80, r: R, fill: “none”, stroke: “rgba(255,255,255,0.05)”, strokeWidth: 5 }),
h(“circle”, { cx: 80, cy: 80, r: R, fill: “none”,
stroke: ringColor, strokeWidth: 5, strokeLinecap: “round”,
strokeDasharray: C, strokeDashoffset: C * (1 - progress),
transform: “rotate(-90 80 80)”,
style: { transition: “stroke-dashoffset 1s linear, stroke 0.3s” },
})
),
h(“div”, { style: { position: “absolute”, inset: 0, display: “flex”, flexDirection: “column”, alignItems: “center”, justifyContent: “center” }},
h(“span”, { style: { fontSize: 38, fontWeight: 800, fontFamily: mono, color: done ? “#cc9977” : “#e8dcc8” }}, formatTime(remaining)),
done && h(“span”, { style: { fontSize: 11, color: “#cc9977”, marginTop: 2, fontFamily: mono, textTransform: “uppercase”, letterSpacing: “0.12em” }}, “batch ready”)
)
),
h(“div”, { style: { display: “flex”, gap: 10 }},
h(“button”, { onClick: onToggle, style: {
padding: “12px 32px”, borderRadius: 10, border: “none”, cursor: “pointer”,
fontSize: 15, fontWeight: 700, fontFamily: sans,
background: running ? “rgba(200,160,120,0.18)” : “rgba(120,180,120,0.18)”,
color: running ? “#d4b896” : “#b8d4a8”,
}}, running ? “Pause” : remaining < DURATION && !done ? “Resume” : “Start”),
(remaining < DURATION || done) && h(“button”, { onClick: onReset, style: {
padding: “12px 22px”, borderRadius: 10,
border: “1px solid rgba(255,255,255,0.07)”,
background: “transparent”, cursor: “pointer”,
fontSize: 15, fontWeight: 500, fontFamily: sans,
color: “rgba(232,220,200,0.85)”,
}}, “Reset”)
)
);
}

function LossInput({ label, value, onChange }) {
return h(“div”, { style: { flex: 1 }},
h(“div”, { style: { fontSize: 10, textTransform: “uppercase”, letterSpacing: “0.1em”, color: dim, fontFamily: mono, marginBottom: 6 }}, label),
h(“input”, {
type: “number”, inputMode: “numeric”, value, placeholder: “0”,
onChange: e => onChange(e.target.value),
style: {
width: “100%”, padding: “12px 14px”, fontSize: 20, fontWeight: 800,
fontFamily: sans, color: “#e8dcc8”,
background: “rgba(255,255,255,0.03)”, border: “1.5px solid rgba(255,255,255,0.07)”,
borderRadius: 10, outline: “none”, boxSizing: “border-box”,
},
onFocus: e => e.target.style.borderColor = “rgba(200,140,120,0.3)”,
onBlur: e => e.target.style.borderColor = “rgba(255,255,255,0.07)”,
})
);
}

function LossTracker({ loss, setLoss }) {
const [copied, setCopied] = useState(false);
const set = (key, val) => setLoss(prev => ({ …prev, [key]: val }));
const num = (key) => parseInt(loss[key]) || 0;

const today = new Date();
const dateStr = today.toLocaleDateString(“en-US”, { weekday: “short”, month: “short”, day: “numeric”, year: “numeric” });
const isoDate = today.toISOString().split(“T”)[0];

const anyLoss = num(“8oz_pkg”) + num(“8oz_product”) + num(“2lb_pkg”) + num(“2lb_product”) > 0;

const summaryRows = [
{ label: “8 oz packaging”, value: num(“8oz_pkg”) },
{ label: “8 oz product”, value: num(“8oz_product”) },
{ label: “2 lb packaging”, value: num(“2lb_pkg”) },
{ label: “2 lb product”, value: num(“2lb_product”) },
].filter(r => r.value > 0);

const buildText = () => {
let lines = [“Tempeh Loss Log — “ + dateStr];
summaryRows.forEach(r => lines.push(”  “ + r.label + “: “ + r.value));
return lines.join(”\n”);
};

const handleCopy = () => {
navigator.clipboard.writeText(buildText()).then(() => {
setCopied(true);
setTimeout(() => setCopied(false), 2000);
}).catch(() => {});
};

const handleCSV = () => {
const header = “date,8oz_packaging,8oz_product,2lb_packaging,2lb_product”;
const row = isoDate + “,” + num(“8oz_pkg”) + “,” + num(“8oz_product”) + “,” + num(“2lb_pkg”) + “,” + num(“2lb_product”);
const blob = new Blob([header + “\n” + row], { type: “text/csv” });
const url = URL.createObjectURL(blob);
const a = document.createElement(“a”);
a.href = url; a.download = “tempeh-loss-” + isoDate + “.csv”;
a.click(); URL.revokeObjectURL(url);
};

const summaryEls = [];
summaryRows.forEach((r, i) => {
summaryEls.push(
h(“div”, { key: r.label, style: { display: “flex”, justifyContent: “space-between”, alignItems: “center”, padding: “8px 0” }},
h(“span”, { style: { fontSize: 13, color: mid }}, r.label),
h(“span”, { style: { fontSize: 18, fontWeight: 800, color: “#cc9977”, fontFamily: mono }}, r.value)
)
);
if (i < summaryRows.length - 1) {
summaryEls.push(h(“div”, { key: “div” + i, style: { height: 1, background: “rgba(255,255,255,0.04)” }}));
}
});

return h(“div”, { style: { padding: “20px 18px” }},
h(“div”, { style: { textAlign: “center”, marginBottom: 18, fontSize: 13, color: “rgba(232,220,200,0.9)”, fontFamily: mono }}, dateStr),

function App() {
const DURATION = 12 * 60;
const [total8, setTotal8] = useState(””);
const [total2, setTotal2] = useState(””);
const [tab, setTab] = useState(“calc”);
const [timerRemaining, setTimerRemaining] = useState(DURATION);
const [timerRunning, setTimerRunning] = useState(false);
const [timerDone, setTimerDone] = useState(false);
const intervalRef = useRef(null);
const [loss, setLoss] = useState({ “8oz_pkg”: “”, “8oz_product”: “”, “2lb_pkg”: “”, “2lb_product”: “” });

useEffect(() => {
if (timerRunning && timerRemaining > 0) {
intervalRef.current = setInterval(() => {
setTimerRemaining(r => {
if (r <= 1) {
clearInterval(intervalRef.current);
setTimerRunning(false);
setTimerDone(true);
try {
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const beep = (t) => {
const o = ctx.createOscillator();
const g = ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.frequency.value = 880; o.type = “sine”;
g.gain.setValueAtTime(0.35, t);
g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
o.start(t); o.stop(t + 0.3);
};
beep(ctx.currentTime); beep(ctx.currentTime + 0.45); beep(ctx.currentTime + 0.9);
} catch (e) {}
return 0;
}
return r - 1;
});
}, 1000);
}
return () => clearInterval(intervalRef.current);
}, [timerRunning, timerRemaining]);

const has8 = (parseInt(total8) || 0) > 0;
const has2 = (parseInt(total2) || 0) > 0;
const totalBatches = (has8 ? distribute(parseInt(total8), SIZES[“8oz”].pushMax)?.minBatches || 0 : 0)
+ (has2 ? distribute(parseInt(total2), SIZES[“2lb”].pushMax)?.minBatches || 0 : 0);
const timerActive = timerRunning || timerDone || timerRemaining < DURATION;

const tabs = [[“calc”, “Batches”], [“loss”, “Loss”], [“timer”, “Timer”]];

return h(“div”, { style: { minHeight: “100vh”, background: “#1a1f16”, color: “#e8dcc8”, fontFamily: sans }},
